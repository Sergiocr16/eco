<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Eco Logo Editable Preview</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Inter, Avenir Next, Helvetica Neue, Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      width: min(90vw, 720px);
      text-align: center;
    }
    svg {
      width: 100%;
      height: auto;
    }
    p {
      opacity: .75;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Editable SVG starts here -->
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <title>Eco Logo Editable</title>
  <desc>Minimal editable vector logo for Eco AI assistant app.</desc>

  <defs>
    <linearGradient id="ecoGradient" x1="250" y1="250" x2="950" y2="950" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#48E0D4"/>
      <stop offset="100%" stop-color="#76F2A4"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: delete this rect if you want transparent background -->
  <rect id="background" width="1200" height="1200" rx="80" fill="#0D1016"/>

  <!-- Icon group -->
  <g id="eco-icon" transform="translate(0, -20)">
    <!-- Echo circular stroke -->
    <path id="echo-ring"
          d="M 377 618
             A 222 222 0 1 1 566 790"
          fill="none"
          stroke="url(#ecoGradient)"
          stroke-width="44"
          stroke-linecap="round"
          filter="url(#softGlow)"/>

    <!-- Echo dot -->
    <circle id="echo-dot"
            cx="397"
            cy="705"
            r="31"
            fill="url(#ecoGradient)"
            filter="url(#softGlow)"/>
  </g>

  <!-- Wordmark -->
  <g id="eco-wordmark" transform="translate(0, 0)">
    <text id="eco-text"
          x="600"
          y="875"
          text-anchor="middle"
          font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-size="130"
          font-weight="300"
          letter-spacing="46"
          fill="#F5F7FA">eco</text>
  </g>
</svg>

    <!-- Editable SVG ends here -->
    <p>Para cambiar colores, edita #48E0D4, #76F2A4, #0D1016 o el texto “eco”.</p>
  </div>
</body>
</html>
