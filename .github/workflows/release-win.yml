name: release-win

# Publica el instalador NSIS de Windows + latest.yml a un GitHub Release para
# que electron-updater pueda auto-actualizar. No corre en cada push (respeta
# "Sergio decide cuándo"): se dispara al empujar un tag vX.Y.Z o a mano desde
# la pestaña Actions.
#
# Requisito: la versión en electron/package.json debe coincidir con el tag
# (electron-updater compara app.getVersion() contra latest.yml).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # crear/actualizar el Release y subir los artefactos

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build + publish (NSIS + latest.yml)
        env:
          # electron-builder lo usa para crear el Release y subir los artefactos.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Config web de Firebase. Se hornea en el bundle en build-time: el .exe
          # llega a una máquina sin `.env.local`, así que si falta acá, el usuario
          # ve "Firebase no está configurado" y no puede loguearse. Desde v1.0.5
          # el build FALLA si faltan (guard en frontend/vite.config.ts) en vez de
          # publicar un instalador roto en silencio, como pasó de v1.0.1 a v1.0.4.
          #
          # Son identificadores públicos (viajan en cualquier cliente), no
          # credenciales: la autorización real son las Firestore Security Rules.
          # Igual van como secrets para no dejarlos en un repo público.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run release:win
